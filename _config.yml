title: "Agents Gateway"
tagline: "Production FastAPI gateway for AI agents, built on Agno. MIT-licensed, deploy in one click."
description: >-
  Agents Gateway is an open-source FastAPI service for serving, orchestrating,
  and managing AI agents. Built on Agno. Includes a supervisor/worker
  execution platform, agent teams, prompt versioning, OAuth token storage,
  and pre-built toolkits for Calendar, Email, Contacts, and Drive (Google &
  Microsoft). MIT-licensed. Deploy in one click to Render, Railway, or Koyeb.
url: "https://agentsgateway.dev"
baseurl: ""
repository: liberzon/agents-gateway
github_username: liberzon
author:
  name: Yair Liberzon
  url: https://github.com/liberzon
twitter:
  card: summary_large_image

logo: /assets/og-image.png

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - .github
  - _api-docs-src

# Treat /_docs/*.md as top-level pages (populated by pages.yml at build time
# from liberzon/agents-gateway-docs). Local builds work without it — folder
# is simply empty.
include:
  - _docs

permalink: pretty

# Analytics — pick one (or none for no tracking).
# Defaults to GoatCounter: free, open-source, no cookies, no consent banner needed.
# Sign up at https://www.goatcounter.com, then set goatcounter_code below.
analytics:
  # Set to one of: goatcounter | plausible | cloudflare | umami | "" (none)
  provider: goatcounter

  # GoatCounter — your-code.goatcounter.com → put "your-code" here
  goatcounter_code: agents-gateway

  # Plausible — domain you registered in Plausible (uses official cloud)
  plausible_domain: agentsgateway.dev

  # Cloudflare Web Analytics — beacon token from CF dashboard
  cloudflare_token: ""

  # Umami — host + website id (works with cloud.umami.is or self-hosted)
  umami_host: cloud.umami.is
  umami_website_id: ""

defaults:
  - scope:
      path: ""
    values:
      layout: default
